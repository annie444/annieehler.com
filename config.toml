baseURL = 'http://example.org/'
languageCode = 'en-us'
title = 'My New Hugo Site'

theme = "reveal-hugo"

[markup.goldmark.renderer]
unsafe = true

# use Hugo's hl in markdown (with or without a language tag)
[markup.highlight]
codeFences = true
style = "github"

[outputFormats.Reveal]
baseName = "index"
mediaType = "text/html"
isHTML = true

[params.reveal_hugo]
theme = "stylesheets/robot-lung.css"
load_default_plugins = true
plugins = [
    "revealjs-simple-gallery/gallery.plugin.js"
]

[params.reveal_hugo.templates.grey]
background = "#424242"
transition = "convex"